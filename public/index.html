<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#080812" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Small Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="landing.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <p class="header-label">Local multiplayer</p>
        <h1 class="header-title">Small Games</h1>
        <p class="header-sub">Pick a game, share the code, play with friends on the same WiFi.</p>
      </header>

      <div class="games">
        <!-- Tilt Tiles -->
        <a href="tilttiles.html" class="game-card" id="card-tilt">
          <div class="game-icon" aria-hidden="true">
            <div class="tile-grid">
              <span class="tile t-aurora"></span>
              <span class="tile t-flare"></span>
              <span class="tile t-glacier"></span>
              <span class="tile t-solar"></span>
            </div>
          </div>
          <div class="game-info">
            <h2 class="game-name">Tilt Tiles</h2>
            <p class="game-pitch">Tilt your phone. Roll to safety. Survive the grid.</p>
          </div>
          <span class="game-arrow">&#8594;</span>
        </a>

        <!-- Liar's Bar -->
        <a href="liarsbar.html" class="game-card" id="card-liar">
          <div class="game-icon" aria-hidden="true">
            <div class="dagger-emblem">
              <span class="suit">&#9824;</span>
            </div>
          </div>
          <div class="game-info">
            <h2 class="game-name">Liar's Bar</h2>
            <p class="game-pitch">Bluff your way out. Or take the bullet.</p>
          </div>
          <span class="game-arrow">&#8594;</span>
        </a>
      </div>


    </div>

    <script>
      // Route each game to the right protocol — but ONLY on a bare LAN IP,
      // where Tilt Tiles needs the self-signed HTTPS port for motion sensors
      // while Liar's Bar can stay on plain HTTP (no cert warning).
      //
      // On localhost OR a real domain (cloud hosting), the whole site is already
      // one origin (HTTPS in the cloud), so the relative links work for both
      // games and Tilt Tiles sensors work without any cert juggling.
      (function () {
        var host = location.hostname;
        var isLanIP = /^\d{1,3}(\.\d{1,3}){3}$/.test(host);
        if (!isLanIP) return;

        var curPort = Number(location.port) || (location.protocol === "https:" ? 443 : 80);
        var httpPort, httpsPort;
        if (location.protocol === "https:") {
          httpsPort = curPort;
          httpPort = curPort - 1;
        } else {
          httpPort = curPort;
          httpsPort = curPort + 1;
        }

        var tilt = document.getElementById("card-tilt");
        var liar = document.getElementById("card-liar");
        if (tilt) tilt.href = "https://" + host + ":" + httpsPort + "/tilttiles.html";
        if (liar) liar.href = "http://" + host + ":" + httpPort + "/liarsbar.html";
      })();
    </script>
  </body>
</html>
